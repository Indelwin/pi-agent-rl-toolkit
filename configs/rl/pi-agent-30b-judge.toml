# =============================================================
# Production RL run — Qwen3-30B-A3B with LLM judge scoring
# =============================================================
#
# Model: Qwen/Qwen3-30B-A3B-Instruct-2507 (30B MoE, 3B active)
# Judge: gpt-4.1-nano via OpenRouter (~$45 for full run)
# Rubric: ToolUseRubric with judge enabled
#   - task_completion (0.50): LLM judge checks actual correctness
#   - tool_outcomes (0.20): did tools succeed?
#   - efficiency (0.15): minimal tool calls within budget
#   - dummy_call_detection (0.15): no redundant/wasted calls
#
# Secrets required: OPENAI_API_KEY, OPENAI_BASE_URL (set via prime secret)
#
# Usage:
#   prime rl run configs/rl/pi-agent-30b-judge.toml
# =============================================================

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 200
batch_size = 256
rollouts_per_example = 8

[sampling]
max_tokens = 4096

[[env]]
id = "anarion/pi_agent_env"
args = { max_turns = 10 }

[checkpoints]
interval = 25
